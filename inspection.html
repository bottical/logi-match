<!doctype html><html lang="ja"><head><meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" /><title>検品実行</title><link rel="stylesheet" href="css/inspection.css" /></head>
<body class="inspection-page sidebar-mini layout-navbar-fixed layout-fixed" data-page="inspection"><div class="wrapper" aria-label="検品実行画面"><nav class="main-header inspection-navbar"><ul class="navbar-nav"><li class="nav-item"><button id="sidebarToggle" class="sidebar-toggle" type="button" aria-label="メニューを開閉">☰</button></li></ul><ul class="navbar-nav ml-auto"><li class="nav-item"><span class="nav-link">👤 <span id="headerUserName">検品ユーザー</span></span></li></ul></nav>
<aside id="sidebarHost"></aside>
<div class="content-wrapper inspection-content-wrapper"><section class="content pt-3"><h5>検品実行</h5><div class="card mb-3 rounded-0"><div class="card-body"><header class="inspection-header"><div class="inspection-header-grid"><div><span>ピッキングNo.</span><strong id="workId">-</strong></div><div><span>お届け先</span><strong id="recipientName">-</strong></div><div><span>ステータス</span><strong id="workStatus">未着手</strong></div><div><span>進捗(SKU)</span><strong id="skuProgress">0 / 0</strong></div><div><span>進捗(数量)</span><strong id="qtyProgress">0 / 0</strong></div><div><span>作業者</span><strong id="workerId">-</strong></div></div><div class="inspection-header-actions"><span id="syncStatus" class="inspection-status-badge inspection-status-badge--idle">待機中</span><button type="button" id="pauseButton">中断</button><button type="button" id="resetButton" class="inspection-button--danger">リセット</button></div></header>
<section class="inspection-picking-panel"><label for="workerSelect">作業者</label><div class="inspection-scan-row"><select id="workerSelect"><option value="">選択してください</option></select></div><label for="pickingNoInput">ピッキングNo.</label><div class="inspection-scan-row"><input id="pickingNoInput" autocomplete="off" inputmode="text" /><button type="button" id="loadPickingButton">読込</button></div></section>
<section class="inspection-scan-panel" aria-label="JANコード入力"><label for="scanCodeInput">JANコード</label><div class="inspection-scan-row"><input id="scanCodeInput" autocomplete="off" inputmode="text" disabled /><button type="button" id="scanSubmitButton">送信</button></div><div class="inspection-qty-mode"><label><input type="checkbox" id="qtyModeToggle" /> 数量入力モード</label><input id="scanQtyInput" type="number" min="1" step="1" value="1" disabled /></div></section>
<section class="inspection-meta-panel"><div><span>荷主様名</span><strong id="shipperName">-</strong></div><div><span>得意先名</span><strong id="customerName">-</strong></div><div><span>検品コード</span><strong id="inspectionCode">-</strong></div><div><span>送信コード</span><strong id="sentCode">-</strong></div></section>
<section class="inspection-main-panels"><article id="judgePanel" class="inspection-judge inspection-judge--idle" aria-live="polite"><p id="mainMsgTxt">ピッキングNo.入力待ち</p><p id="judgeSubText">ピッキングNo.を入力してください。</p><p id="judgeProgressText" class="inspection-judge-progress">0 / 0</p></article><article class="inspection-detail" id="detailPanel" aria-live="polite"></article></section><section class="inspection-list"><h2>検品明細一覧</h2><div class="inspection-table-wrap"><table id="detailTable"><thead><tr id="detailTableHead"></tr></thead><tbody id="detailTableBody"></tbody></table></div></section></div></div></section></div></div>
<dialog id="confirmDialog"><p id="confirmMessage"></p><div class="dialog-actions"><button id="confirmOk" type="button">実行</button><button id="confirmCancel" type="button">キャンセル</button></div></dialog>
<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script><script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore-compat.js"></script><script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-auth-compat.js"></script><script src="js/firebase-config.js"></script><script src="js/auth.js"></script><script src="js/auth-guard.js"></script><script src="js/tenant-context.js"></script><script src="js/bootstrap-tenant.js"></script><script src="js/app-init.js"></script><script src="js/worker-context.js"></script><script src="js/sidebar.js"></script><script src="js/inspection-state.js"></script><script src="js/inspection-repository.js"></script><script src="js/inspection.js"></script></body></html>
