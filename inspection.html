<!doctype html><html lang="ja"><head><meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" /><title>検品実行</title><script>if(new URLSearchParams(location.search).get('shell')==='1'){document.documentElement.classList.add('shell-embedded-root');}</script><link rel="stylesheet" href="css/inspection.css" /></head>
<body class="inspection-page sidebar-mini layout-navbar-fixed layout-fixed" data-page="inspection"><div class="wrapper" aria-label="検品実行画面"><nav class="main-header inspection-navbar"><ul class="navbar-nav"><li class="nav-item"><button id="sidebarToggle" class="sidebar-toggle" type="button" aria-label="メニューを開閉">☰</button></li><li class="nav-item"><span class="app-title">ロジマッチ</span></li><li class="nav-item"><span id="topStatusText" class="top-status">ピッキングNo.待ち</span></li></ul><ul class="navbar-nav ml-auto"><li class="nav-item worker-inline"><span>作業者：<strong id="workerDisplayName">未選択</strong></span><button type="button" id="workerChangeButton" class="link-button">変更</button><select id="workerSelect" class="worker-select-inline" hidden><option value="">選択してください</option></select></li><li class="nav-item"><span id="syncStatus" class="inspection-status-badge inspection-status-badge--idle">待機中</span></li><li class="nav-item"><button type="button" id="pauseButton">中断</button></li><li class="nav-item"><details class="more-menu"><summary>その他 ▼</summary><button type="button" id="resetButton" class="menu-danger">検品実績をリセット</button></details></li></ul></nav>
<aside id="sidebarHost"></aside>
<div class="content-wrapper inspection-content-wrapper"><section class="content pt-3"><div class="card mb-3 rounded-0"><div class="card-body">
<section id="judgePanel" class="inspection-judge inspection-judge--idle" aria-live="polite"><p id="mainMsgTxt">ピッキングNo.待ち</p><p id="judgeSubText">次のピッキングNo.をスキャンしてください</p><p id="judgeProgressText" class="inspection-judge-progress"></p></section>
<section class="inspection-input-bar" aria-label="検品入力バー"><div class="input-group"><label for="pickingNoInput">ピッキングNo.</label><input id="pickingNoInput" autocomplete="off" inputmode="text" /><button type="button" id="loadPickingButton">読込</button><strong id="workIdDisplay" class="readonly-value" hidden>-</strong></div><div class="input-group"><label for="scanCodeInput">JAN</label><input id="scanCodeInput" autocomplete="off" inputmode="text" disabled /><button type="button" id="scanSubmitButton">送信</button></div><div class="input-group qty-group"><label for="scanQtyInput">読取数量</label><input id="scanQtyInput" type="number" min="1" step="1" value="1" disabled /></div></section>
<section id="lastCompletedSummaryPanel" class="last-completed-summary" hidden>直前の作業：<span id="lastCompletedSummaryText"></span></section>
<section class="inspection-progress-card"><div>SKU <strong id="skuProgress">0 / 0</strong></div><div>数量 <strong id="qtyProgress">0 / 0</strong></div><div>状態 <strong id="workStatus">未着手</strong></div><div>経過 <strong id="elapsedTime">00:00</strong></div></section>
<section class="inspection-meta-panel"><div><span>お届け先</span><strong id="recipientName">-</strong></div><div><span>荷主様名</span><strong id="shipperName">-</strong></div><div><span>得意先名</span><strong id="customerName">-</strong></div><div><span>直前JAN</span><strong id="sentCode">-</strong></div></section>
<section class="inspection-list"><h2>検品明細一覧</h2><div class="inspection-table-wrap"><table id="detailTable"><thead><tr id="detailTableHead"></tr></thead><tbody id="detailTableBody"></tbody></table></div></section>
</div></div></section></div></div>
<dialog id="confirmDialog"><p id="confirmMessage"></p><div class="dialog-actions"><button id="confirmOk" type="button">実行</button><button id="confirmCancel" type="button">キャンセル</button></div></dialog>
<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script><script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore-compat.js"></script><script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-auth-compat.js"></script><script src="js/firebase-config.js"></script><script src="js/auth.js"></script><script src="js/auth-guard.js"></script><script src="js/tenant-context.js"></script><script src="js/bootstrap-tenant.js"></script><script src="js/app-init.js"></script><script src="js/worker-context.js"></script><script src="js/sidebar.js"></script><script src="js/inspection-state.js"></script><script src="js/inspection-repository.js"></script><script src="js/inspection.js"></script></body></html>
