<body class="inspection-page sidebar-mini layout-navbar-fixed layout-fixed" data-page="inspection"><div class="wrapper" aria-label="検品実行画面"><nav class="main-header inspection-navbar"><ul class="navbar-nav"><li class="nav-item"><button id="sidebarToggle" class="sidebar-toggle" type="button" aria-label="メニューを開閉">☰</button></li><li class="nav-item"><span class="app-title">ロジマッチ</span></li><li class="nav-item"><span id="topStatusText" class="top-status">ピッキングNo.待ち</span></li></ul><ul class="navbar-nav ml-auto"></ul></nav>

<section class="inspection-action-bar" aria-label="検品操作"><div class="inspection-action-status"><span id="syncStatus" class="inspection-status-badge inspection-status-badge--idle">待機中</span></div><div class="inspection-action-buttons"><button type="button" id="pauseButton" class="secondary-action">中断</button><button type="button" id="resetButton" class="danger-action">検品実績をリセット</button></div></section>
