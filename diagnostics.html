<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="robots" content="noindex,nofollow">
  <title>本番Firestore read-only診断</title>
  <link rel="stylesheet" href="css/inspection.css?v=20260513-1">
  <link rel="stylesheet" href="css/diagnostics.css?v=20260609-1">
  <link rel="icon" href="./assets/brand/favicon.ico" sizes="any">
</head>
<body class="inspection-page" data-page="diagnostics">
  <main class="diagnostics-page">
    <section class="panel">
      <h1>本番Firestore read-only診断</h1>
      <p class="diagnostics-warning"><strong>診断専用:</strong> この画面は Firestore の write / update / delete を実行しません。</p>
      <p id="authStatus" class="diagnostics-status">認証・権限を確認しています…</p>
      <div class="diagnostics-grid">
        <label>clientId（必須）<input id="clientId" autocomplete="off" placeholder="診断対象clientId"></label>
        <label>1 collectionあたりの最大取得件数
          <select id="maxDocs">
            <option value="1000">1,000</option>
            <option value="5000" selected>5,000</option>
            <option value="10000">10,000</option>
            <option value="20000">20,000</option>
          </select>
        </label>
        <label>ページサイズ
          <select id="pageSize">
            <option value="100">100</option>
            <option value="250" selected>250</option>
            <option value="500">500</option>
          </select>
        </label>
      </div>
      <p id="estimate" class="diagnostics-estimate"></p>
      <label class="diagnostics-confirm"><input id="dryRun" type="checkbox"> dry-run固定・read-onlyであることを確認しました</label>
      <label class="diagnostics-confirm">確認のためclientIdを再入力 <input id="clientIdConfirm" autocomplete="off"></label>
      <div class="diagnostics-actions">
        <button id="runDiagnostics" class="primary-action" type="button" disabled>read-only診断を実行</button>
        <button id="copyMarkdown" class="secondary-action" type="button" disabled>Markdownをコピー</button>
        <button id="copyJson" class="secondary-action" type="button" disabled>JSONをコピー</button>
        <button id="downloadJson" class="secondary-action" type="button" disabled>JSONを保存</button>
      </div>
      <p id="runStatus" class="diagnostics-status"></p>
    </section>
    <section class="panel diagnostics-output-panel">
      <h2>診断結果</h2>
      <pre id="reportOutput">未実行</pre>
    </section>
  </main>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-auth-compat.js"></script>
  <script src="js/firebase-config.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/internal-auth.js"></script>
  <script src="js/tenant-context.js"></script>
  <script src="js/permissions.js"></script>
  <script src="js/firestore-paths.js?v=20260513-1"></script>
  <script src="js/app-init.js?v=20260513-1"></script>
  <script src="js/diagnostics.js?v=20260609-1"></script>
</body>
</html>
