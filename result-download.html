<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>検品実績DL</title>
  <script>
    (function () {
      var params = new URLSearchParams(location.search);
      var shellMode = params.get('shell') === '1';
      if (!shellMode) {
        location.replace('./#result-download');
        return;
      }
      document.documentElement.classList.add('shell-embedded-root');
    })();
  </script>
  <link rel="stylesheet" href="css/inspection.css?v=20260513-1">

    <link rel="icon" href="./assets/brand/favicon.ico" sizes="any">
  </head>
<body class="inspection-page" data-page="result-download">
  <div class="wrapper">
    <nav class="main-header">
      <ul class="navbar-nav">
        <li class="nav-item"><button id="sidebarToggle" class="sidebar-toggle" type="button" aria-label="メニューを開閉">☰</button></li>
        <li class="nav-item"><span class="nav-link">検品実績DL</span></li>
      </ul>
    </nav>
    <aside id="sidebarHost"></aside>
    <div class="content-wrapper">
      <main class="portal">
        <section class="panel result-download-panel">
          <h1 class="result-download-title">検品実績ダウンロード</h1>
          <p class="result-download-lead">出力条件を指定してCSVをダウンロードしてください。</p>

          <div class="download-card-grid">
            <section class="download-condition-card" aria-labelledby="completedDownloadsTitle">
              <div class="download-card-header">
                <h2 id="completedDownloadsTitle">完了日で出力</h2>
                <span class="download-card-badge">完了実績</span>
              </div>
              <div class="filter-row">
                <label class="filter-field" for="completedFrom"><span>検品完了日（開始）</span><input id="completedFrom" type="date"></label>
                <span class="filter-separator">〜</span>
                <label class="filter-field" for="completedTo"><span>検品完了日（終了）</span><input id="completedTo" type="date"></label>
              </div>
              <p class="filter-help">31日以内で指定してください。片方のみ指定した場合は、その1日分を出力します。</p>
              <div class="download-actions">
                <button id="exportCompletedCsvButton" type="button" class="primary-action">完了作業ログCSV</button>
                <button id="exportDetailCsvButton" type="button" class="primary-action">明細CSV</button>
              </div>
            </section>

            <section class="download-condition-card download-condition-card--heavy" aria-labelledby="scanLogDownloadsTitle">
              <div class="download-card-header">
                <h2 id="scanLogDownloadsTitle">スキャン日で出力</h2>
                <span class="download-card-badge download-card-badge--warning">ログ</span>
              </div>
              <div class="filter-row">
                <label class="filter-field" for="logFrom"><span>スキャン日（開始）</span><input id="logFrom" type="date"></label>
                <span class="filter-separator">〜</span>
                <label class="filter-field" for="logTo"><span>スキャン日（終了）</span><input id="logTo" type="date"></label>
              </div>
              <p class="filter-help">7日以内で指定してください。片方のみ指定した場合は、その1日分を出力します。</p>
              <div class="download-actions">
                <button id="exportScanLogCsvButton" type="button" class="primary-action">全スキャンログCSV</button>
              </div>
            </section>
          </div>

          <p id="downloadStatus" class="status-message" aria-live="polite"></p>
        </section>
      </main>
    </div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-auth-compat.js"></script>
  <script src="js/firebase-config.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/auth-guard.js"></script>
  <script src="js/internal-auth.js"></script>
  <script src="js/tenant-context.js"></script>
  <script src="js/bootstrap-tenant.js"></script>
  <script src="js/permissions.js"></script>
  <script src="js/firestore-paths.js?v=20260513-1"></script>
  <script src="js/app-init.js?v=20260513-1"></script>
  <script src="js/sidebar.js"></script>
  <script src="js/date-range-policy.js?v=20260513-1"></script>
  <script src="js/result-download.js?v=20260513-1"></script>
</body>
</html>
