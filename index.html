<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ハンディー検品画面</title>
  <link rel="stylesheet" href="css/inspection.css" />
</head>
<body class="inspection-page sidebar-mini layout-navbar-fixed layout-fixed">
  <div class="wrapper" aria-label="検品実行画面">
    <nav class="main-header inspection-navbar">
      <ul class="navbar-nav">
        <li class="nav-item"><span class="nav-link">☰</span></li>
      </ul>
      <ul class="navbar-nav ml-auto">
        <li class="nav-item"><span class="nav-link">👤 <span id="headerUserName">検品ユーザー</span></span></li>
      </ul>
    </nav>

    <aside class="main-sidebar inspection-sidebar">
      <div class="brand-link"><span class="brand-text">ロジマッチ</span></div>
      <div class="sidebar">
        <nav class="mt-2">
          <ul class="nav nav-pills nav-sidebar flex-column">
            <li class="nav-item"><span class="nav-link active"><p>ライト版検品実行</p></span></li>
          </ul>
        </nav>
      </div>
    </aside>

    <div class="content-wrapper inspection-content-wrapper">
      <section class="content pt-3">
        <h5>ハンディー検品画面</h5>
        <div class="card mb-3 rounded-0">
          <div class="card-body">
            <header class="inspection-header">
              <div class="inspection-header-grid">
                <div><span>作業ID</span><strong id="workId">-</strong></div>
                <div><span>お届け先</span><strong id="recipientName">-</strong></div>
                <div><span>ステータス</span><strong id="workStatus">未着手</strong></div>
                <div><span>進捗(SKU)</span><strong id="skuProgress">0 / 0</strong></div>
                <div><span>進捗(数量)</span><strong id="qtyProgress">0 / 0</strong></div>
                <div><span>作業者</span><strong id="workerId">-</strong></div>
              </div>
              <div class="inspection-header-actions">
                <span id="syncStatus" class="inspection-status-badge inspection-status-badge--idle">待機中</span>
                <button type="button" id="pauseButton">中断</button>
                <button type="button" id="resetButton" class="inspection-button--danger">リセット</button>
                <button type="button" id="completeButton" hidden>完了</button>
              </div>
            </header>

            <section class="inspection-scan-panel" aria-label="バーコード入力">
              <label for="scanCodeInput">バーコード</label>
              <div class="inspection-scan-row">
                <input id="scanCodeInput" autocomplete="off" inputmode="text" />
                <button type="button" id="scanSubmitButton">送信</button>
              </div>
              <div class="inspection-qty-mode">
                <label><input type="checkbox" id="qtyModeToggle" /> 数量入力モード（OFF時: 1スキャン=1個）</label>
                <input id="scanQtyInput" type="number" min="1" step="1" value="1" disabled />
              </div>
            </section>

            <section class="inspection-main-panels">
              <article id="judgePanel" class="inspection-judge inspection-judge--idle" aria-live="polite">
                <p id="mainMsgTxt">待機中</p>
                <p id="judgeSubText">バーコードをスキャンしてください</p>
              </article>
              <article class="inspection-detail" id="detailPanel" aria-live="polite"></article>
            </section>

            <section class="inspection-list" aria-label="検品明細">
              <h2>検品明細一覧</h2>
              <ul id="detailList"></ul>
            </section>
          </div>
        </div>
      </section>
    </div>
  </div>

  <dialog id="confirmDialog">
    <p id="confirmMessage"></p>
    <div class="dialog-actions">
      <button id="confirmOk" type="button">実行</button>
      <button id="confirmCancel" type="button">キャンセル</button>
    </div>
  </dialog>

  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-auth-compat.js"></script>
  <script src="js/firebase-config.js"></script>
  <script src="js/inspection-state.js"></script>
  <script src="js/inspection-repository.js"></script>
  <script src="js/inspection.js"></script>
</body>
</html>
