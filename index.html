<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>ロジマッチ検品ポータル</title>
    <link rel="stylesheet" href="css/inspection.css" />
  </head>
  <body class="inspection-page">
    <main class="portal">
      <h1>検品ポータル</h1>
      <p id="firebaseStatus">Firebase接続確認中...</p>

      <section class="panel">
        <h2>CSV取込</h2>
        <input id="csvFile" type="file" accept=".csv,text/csv" />
        <button id="importButton">取込実行</button>
        <p id="importStatus">待機中</p>
        <p id="importResult"></p>
        <ul id="importWarnings" class="warning-list"></ul>
        <ul id="importErrors" class="error-list"></ul>
      </section>

      <section class="panel">
        <h2>作業一覧</h2>
        <p id="listLimitNote">最大300件表示</p>
        <div class="filters">
          <input id="filterWorkId" placeholder="作業ID検索" />
          <select id="filterStatus">
            <option value="">全て</option>
            <option value="unstarted">未着手</option>
            <option value="current">作業中</option>
            <option value="suspended">中断</option>
            <option value="completed">完了</option>
          </select>
          <input id="filterFrom" type="date" />
          <input id="filterTo" type="date" />
          <button id="searchButton">検索</button>
          <button id="reloadButton">再読込</button>
        </div>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>作業ID</th>
                <th>お届け先名</th>
                <th>ステータス</th>
                <th>SKU進捗</th>
                <th>数量進捗</th>
                <th>取込日</th>
                <th>完了日時</th>
                <th>作業者</th>
                <th>操作</th>
              </tr>
            </thead>
            <tbody id="workTableBody"></tbody>
          </table>
        </div>
        <p id="listStatus"></p>
      </section>

      <section class="panel">
        <h2>ログ出力</h2>
        <input id="logFrom" type="date" />
        <input id="logTo" type="date" />
        <button id="exportButton">CSV出力</button>
      </section>
    </main>

    <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-auth-compat.js"></script>
    <script src="js/firebase-config.js"></script>
    <script src="js/csv-utils.js"></script>
    <script src="js/inspection-import.js"></script>
    <script src="js/inspection-list.js"></script>
  </body>
</html>
