<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>作業者一覧</title>
    <script>
      (function () {
        var params = new URLSearchParams(location.search);
        if (params.get('shell') === '1') {
          document.documentElement.classList.add('shell-embedded-root');
        }
      })();
    </script>
    <link rel="stylesheet" href="./css/app.css" />
  </head>
  <body data-page="workers">
    <aside id="sidebarHost"></aside>
    <main class="page-main">
      <h1>作業者一覧</h1>
      <p id="workersStatus"></p>
      <table>
        <thead>
          <tr>
            <th>作業者名</th><th>有効/無効</th><th>現在作業中のピッキングNo.</th><th>現在作業開始時刻</th><th>最終作業日時</th><th>操作</th>
          </tr>
        </thead>
        <tbody id="workersBody"></tbody>
      </table>
    </main>
    <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-auth-compat.js"></script>
    <script src="./js/firebase-config.js"></script>
    <script src="./js/auth.js"></script>
    <script src="./js/auth-guard.js"></script>
    <script src="./js/internal-auth.js"></script>
    <script src="./js/tenant-context.js"></script>
    <script src="./js/bootstrap-tenant.js"></script>
    <script src="./js/permissions.js"></script>
    <script src="./js/firestore-paths.js"></script>
    <script src="./js/app-init.js"></script>
    <script src="./js/sidebar.js"></script>
    <script src="./js/workers.js"></script>
  </body>
</html>
