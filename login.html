<!doctype html><html lang="ja"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>ログイン</title><link rel="stylesheet" href="css/inspection.css"></head><body class="inspection-page login-page"><main class="portal login-portal"><section class="panel login-panel"><p class="login-brand">ロジマッチ</p><h1>ログイン</h1><p class="login-lead">検品システムにログインしてください。</p><input id="email" type="email" placeholder="メールアドレス" autocomplete="email"><input id="password" type="password" placeholder="パスワード" autocomplete="current-password"><button id="loginButton">ログイン</button><p id="errorMessage" class="login-error" aria-live="polite"></p></section></main>
<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script><script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore-compat.js"></script><script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-auth-compat.js"></script>
<script src="js/firebase-config.js"></script><script src="js/auth.js"></script><script src="js/bootstrap-tenant.js"></script>
<script>(async function(){const $=id=>document.getElementById(id);const user=await window.authApi.waitForAuthUser();if(user){location.href='./inspection.html';return;}async function submitLogin(){const email=$('email').value.trim();const password=$('password').value;if(!email||!password){$('errorMessage').textContent='メールアドレスとパスワードを入力してください。';return;}$('loginButton').disabled=true;try{$('errorMessage').textContent='';await window.authApi.loginWithEmail(email,password);location.href='./inspection.html';}catch(e){$('errorMessage').textContent='ログインに失敗しました。メールアドレスまたはパスワードを確認してください。';}finally{$('loginButton').disabled=false;}}$('loginButton').onclick=submitLogin;$('password').addEventListener('keydown',e=>{if(e.key==='Enter')submitLogin();});$('email').addEventListener('keydown',e=>{if(e.key==='Enter')submitLogin();});})();</script>
</body></html>
